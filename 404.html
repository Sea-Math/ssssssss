<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* A very dark, flat midnight blue */
            background-color: #0a0e14; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #d1d5db;
            text-align: center;
        }

        .container {
            max-width: 400px;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -2px;
            color: #ffffff;
        }

        p {
            font-size: 1.1rem;
            margin-top: 10px;
            opacity: 0.8;
        }

        .home-link {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            border: 1px solid #374151;
            border-radius: 6px;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }

        .home-link:hover {
            background-color: #1f2937;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <p>This page has vanished into the deep.</p>
        <a href="/" class="home-link">Return Home</a>
    </div>

</body>
</html>
